# Tool configurations only. Dependencies are managed in pixi.toml.

[tool.ruff]
line-length = 88
target-version = "py312"
extend-exclude = ["config", "temp"]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = ["--strict-markers", "--strict-config"]
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
    "slow: Slow tests",
]

[tool.yamllint]
extends = "default"
