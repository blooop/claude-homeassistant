[workspace]
name = "claude-homeassistant"
version = "1.0.0"
description = "Home Assistant configuration management with Claude Code"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.12"
ruff = ">=0.5.0"
yq = ">=3.0"
yamllint = ">=1.35"
pytest = ">=8.0"

[pypi-dependencies]
homeassistant = ">=2024.1.0,<2026"
voluptuous = ">=0.14.0"
pyyaml = ">=6.0.0"
jsonschema = ">=4.0.0"
requests = ">=2.31.0"
colorlog = ">=6.0.0"

[tasks]
pull = "make pull"
push = "make push"
validate = "make validate"
backup = "make backup"
status = "make status"
entities = "make entities"
reload = "make reload"
test-ssh = "make test-ssh"
format-yaml = "make format-yaml"
test = "make test"
setup-ha = "bash setup.sh"
